name: Frontend CI

on:
  push:
    branches: [main]
    paths: ["FrontEnd/**"]
  pull_request:
    paths: ["FrontEnd/**"]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: FrontEnd/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: FrontEnd

      - name: Type check
        run: npx tsc --noEmit
        working-directory: FrontEnd

      - name: Lint
        run: npm run lint
        working-directory: FrontEnd
